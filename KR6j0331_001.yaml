body:
  text: 大興善寺三藏沙門大廣智不空奉詔譯爾時觀世音菩薩在大眾會座中而起五體投地禮佛雙足而白佛言我有一真言一印三使者真言廣大成就之法願為利益安樂閻浮提諸善男子善女人故唯願世尊哀愍聽許我今說之真言曰那謨羅怛那哆羅夜耶二那謨阿利耶婆嚧枳帝三跢姪他四闍曳闍曳二合闍夜五婆醯你闍榆跢利六迦囉迦羅摩羅摩羅者羅器拏器拏八薩婆羯磨䟦羅拏你九迷婆底莎呵誦此呪已惡業消滅誦至七遍五逆罪滅若滿千遍已罪無不滅滿十萬遍面見觀音種種莊嚴者七日之中初作法時唯得食乳糜蘇最後一日勿食十五日夜佛前念誦無定限數見像搖出聲唱言善哉善哉故光明照曜復以真珠寶物安呪師頂上即智成驗面見觀音已得滿一切善願又於垂眠中夢見觀音種種莊嚴者一切善事成就一切惡業消滅直轉讀者亦得滅罪次說一印亦利益眾生以一印三十二遍種種成辨二手合二火背相合以二母指押二頭指為鈎以印假使向虗空為天蓋境界向十方天上隨處成結界向本尊為普供養作法為普禮後時為迴向又為發遣若欲降伏惡人者作手印無二以嗔心誦一百八遍一切外道所作滅若人患心病者加持黃土塗於心除差若人患頭病加持大黃二十一遍服之除愈若人患眼者加持杏子之油塗除差若人患腫者香末加持一百八遍塗除愈若人欲令遠去魔事加持苦木一百八遍其人遠去次使者三印二十八部總攝左右手掌平向天上以大指來去天上使者費迦邏亦名淨滿密語曰費迦邏翳醯𠰘娑嚩賀二手合二地來去虗空使者大仙亦名嚩斯密語曰悉你也娑嚩賀二手向虗空以二大指來去下地使者水火雷電自在亦名大羅惹密語曰唵闍曳闍曳娑嚩賀此三種使者能滅三灾能滅三種執能滅生生世世業障生生世世悉地成就又此三種使者無相爭力頓生頓滅轉鉢結縛木合空鉢若人得滿呪功者乘空界為仙人召集天龍藥叉鬼神等任心發遣尤法力也久安五年七月六日辰時許奉受了金剛佛子辨真
